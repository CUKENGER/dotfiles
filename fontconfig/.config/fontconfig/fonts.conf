<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
 <!-- Пользовательские папки для шрифтов -->
 <dir>/home/kol/.local/share/fonts</dir>
 <dir>/usr/share/fonts</dir>
 <!-- Настройки рендеринга -->
 <match target="font">
  <edit mode="assign" name="antialias">
   <bool>true</bool>
  </edit>
  <edit mode="assign" name="hinting">
   <bool>true</bool>
  </edit>
	<!-- 02-02-26 -->
  <!-- <edit mode="assign" name="hintstyle"> -->
  <!--  <const>hintfull</const> -->
  <!-- </edit> -->
  <edit mode="assign" name="hintstyle">
   <const>slight</const>
  </edit>
  <!-- Для LCD-экранов -->
	<!-- 02-02-26 -->
  <!-- <edit mode="assign" name="autohint"> -->
  <!--  <bool>true</bool> -->
  <!-- </edit> -->
  <edit mode="assign" name="autohint">
   <bool>false</bool>
  </edit>
  <!-- Отключить autohint для современных шрифтов -->
  <edit mode="assign" name="dpi">
   <double>96</double>
  </edit>
  <!-- Для HiDPI: 144 или 192 -->
  <edit mode="assign" name="embeddedbitmap">
   <bool>false</bool>
  </edit>
	<edit mode="assign" name="rgba">
    <const>rgb</const>
  </edit>
 </match>
 <match target="pattern">
  <edit mode="assign" name="scale">
   <double>1.0</double>
  </edit>
 </match>
 <!-- Замена sans-serif шрифтов -->
 <alias>
  <family>sans-serif</family>
  <prefer>
   <family>Fira Sans</family>
   <!-- <family>Manrope</family> -->
   <family>Poppins</family>
   <family>Fira Sans</family>
   <!-- <family>Manrope</family> -->
   <family>Noto Sans</family>
  </prefer>
  <default>
   <family>Manrope</family>
  </default>
 </alias>
 <alias>
  <family>sans</family>
  <prefer>
   <family>Noto Color Emoji</family>
   <family>Manrope</family>
   <family>Poppins</family>
   <family>Fira Sans</family>
   <family>Noto Sans</family>
  </prefer>
  <default>
   <family>Manrope</family>
  </default>
 </alias>
 <alias>
  <family>-apple-system</family>
  <prefer>
   <family>Manrope</family>
   <family>Poppins</family>
   <family>Fira Sans</family>
   <family>Noto Sans</family>
  </prefer>
 </alias>
 <!-- Замена serif шрифтов -->
 <alias>
  <family>serif</family>
  <prefer>
   <family>Noto Serif</family>
   <family>Libertinus Serif</family>
  </prefer>
  <default>
   <family>Noto Serif</family>
  </default>
 </alias>
 <!-- Замена monospace шрифтов -->
 <alias>
  <family>monospace</family>
  <prefer>
   <family>FiraCode Nerd Font</family>
   <family>JetBrains Mono</family>
   <family>IBM Plex Mono</family>
   <family>Cascadia Code</family>
   <family>Noto Sans Mono</family>
  </prefer>
  <default>
   <family>FiraCode Nerd Font</family>
  </default>
 </alias>
	<alias>
    <family>emoji</family>
    <prefer>
      <family>Twemoji</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>
 <!-- Замена Microsoft и других шрифтов -->
 <match target="pattern">
  <test name="family" qual="any">
   <string>Arial</string>
  </test>
  <edit binding="strong" mode="assign" name="family">
   <string>Manrope</string>
  </edit>
 </match>
 <match target="pattern">
  <test name="family" qual="any">
   <string>Helvetica</string>
  </test>
  <edit binding="strong" mode="assign" name="family">
   <string>Manrope</string>
  </edit>
 </match>
 <match target="pattern">
  <test name="family" qual="any">
   <string>Verdana</string>
  </test>
  <edit binding="strong" mode="assign" name="family">
   <string>Manrope</string>
  </edit>
 </match>
 <match target="pattern">
  <test name="family" qual="any">
   <string>Tahoma</string>
  </test>
  <edit binding="strong" mode="assign" name="family">
   <string>Manrope</string>
  </edit>
 </match>
 <!-- Установка веса шрифтов -->
 <match target="font">
  <test compare="eq" name="family">
   <string>Manrope</string>
  </test>
  <edit mode="assign" name="weight">
   <int>500</int>
  </edit>
  <!-- Medium -->
 </match>
 <match target="font">
  <test compare="eq" name="family">
   <string>FiraCode Nerd Font</string>
  </test>
  <edit mode="assign" name="weight">
   <int>500</int>
  </edit>
  <!-- Medium -->
 </match>
 </fontconfig>
