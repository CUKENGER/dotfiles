# АДАПТИРОВАННАЯ КОНФИГУРАЦИЯ HYPRLAND НА ОСНОВЕ i3 С GAPs И WAYBAR
# #######################################################################################

autogenerated = 0

################
### МОНИТОРЫ ###
################
# monitor = ,preferred,auto,1
#monitor = ,preferred,auto,1
# monitor=eDP-1,1920x1200@144,0x0,1.25
monitor=eDP-1,disable
# monitor=HDMI-A-1,1920x1080@75,1536x0,1.25
monitor=HDMI-A-1,1920x1080@75,1536x0,1

###################
### ПРОГРАММЫ ###
###################
$terminal = alacritty
$fileManager = dolphin
# $fileManager = thunar
$menu = wofi --show drun --no-cache

#############################
### ПЕРЕМЕННЫЕ ОКРУЖЕНИЯ ###
#############################
env = QT_STYLE_OVERRIDE,kvantum
env = QT_QPA_PLATFORM,wayland
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
# Для поддержки NVIDIA
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = WLR_NO_HARDWARE_CURSORS,1
env = WLR_NO_HARDWARE_CURSORS,0
# env = WLR_RENDERER,vulkan
env = WLR_RENDERER,gles2
env = NVD_BACKEND,direct

env = ELECTRON_OZONE_PLATFORM_HINT,auto

###################
### РАЗРЕШЕНИЯ ###
###################
permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

#####################
### ВНЕШНИЙ ВИД ###
#####################
general {
    gaps_in = 0    # Внутренние отступы (между окнами)
    gaps_out = 0  # Внешние отступы (от краёв экрана)
    border_size = 1
		col.active_border = rgba(c0caf5cc) # Мягкий голубой, лёгкая прозрачность
    col.inactive_border = rgba(4a5a6bcc)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

group {
    col.border_active = rgba(33ccffee)   # Цвет границы активной группы
    col.border_inactive = rgba(595959aa) # Цвет границы неактивной группы
		groupbar {
        enabled = false  # Отключает табы
    }
    # groupbar {
    #     enabled = true               # Включить полосу группы (табы)
    #     font_size = 12              # Размер шрифта в табах
    #     text_color = rgba(ffffffff)  # Цвет текста в табах
    #     col.active = rgba(33ccffee)  # Цвет активного таба
    #     col.inactive = rgba(595959aa) # Цвет неактивного таба
    # height = 20
    # }
}

decoration {
    rounding = 6
    active_opacity = 1.0
    inactive_opacity = 0.98
		shadow {
        enabled = false
    }
    blur {
        enabled = false
        size = 6
        passes = 2
        new_optimizations = true
    }
}

animations {
    enabled = true
    bezier = easeOutQuint,0.23,1,0.32,1
    animation = windows, 1, 4, easeOutQuint
    animation = fade, 1, 3, easeOutQuint
    animation = workspaces, 1, 2, easeOutQuint, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
		vfr = true
}

#############
### ВВОД ###
#############

device {
    name = usb-optical-mouse-
    sensitivity = 0.1 # Максимум, попробуй 0.5, 0.8, 1.0
    # accel_profile = flat # Без ускорения
}

input {
    kb_layout = us,ru
    kb_options = grp:caps_toggle,grp_led:caps
    follow_mouse = 1
# 		repeat_rate = 25
repeat_delay = 350
		# repeat_rate = 50
		# repeat_delay = 500	
		# sensitivity = 1
		# accel_profile = adaptive
		#   force_no_accel = true
		   scroll_factor = 1.5
    touchpad {
        natural_scroll = false
    }
}

xwayland {
  force_zero_scaling = true
}

###################
### ПРИВЯЗКИ КЛАВИШ ###
###################
$mainMod = SUPER
$altMod = ALT

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Запуск приложений
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, D, exec, $menu
bind = $mainMod, W, exec, firefox
bind = $mainMod, E, exec, $fileManager

# Скриншоты
bind = , Print, exec, grim - | wl-copy
bind = $mainMod, Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod SHIFT, S, exec, flameshot
bind = $mainMod SHIFT, P, exec, hyprpicker -a
bind = $mainMod, O, exec, ~/.config/hypr/scripts/ocr-screenshot.sh
bind = $mainMod, S, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%F-%H%M%S).png

# Управление громкостью и яркостью

## ГРОМКОСТЬ
bindel = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume-control.sh up
bindel = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume-control.sh down
bindel = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

## ЯРКОСТЬ
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Закрытие окон
bind = $mainMod, C, killactive
# bind = $altMod, F4, killactive

# # Перемещение фокуса
# bind = $mainMod, H, movefocus, l
# bind = $mainMod, J, movefocus, d
# bind = $mainMod, K, movefocus, u
# bind = $mainMod, L, movefocus, r
#
# # Перемещение окон
# bind = $mainMod SHIFT, H, movewindow, l
# bind = $mainMod SHIFT, J, movewindow, d
# bind = $mainMod SHIFT, K, movewindow, u
# bind = $mainMod SHIFT, L, movewindow, r

# Полноэкранный режим
bind = $mainMod, F, fullscreen

# Переключение между плавающими и тайловыми окнами
bind = $mainMod, Space, togglefloating

# Scratchpad
bind = $mainMod, M, exec, ~/.config/hypr/scripts/toggle-scratchpad.sh
# Опционально: показ/скрытие scratchpad для удобства
bind = $mainMod SHIFT, M, togglespecialworkspace, scratchpad
bind = $mainMod ALT, M, exec, ~/.config/hypr/scripts/select-from-scratchpad.sh

bind = $mainMod, T, togglegroup          # Создать/убрать группу
bind = $altMod, TAB, changegroupactive  # Переключение между окнами в группе
bind = $mainMod SHIFT, T, moveintogroup, l  # Добавить окно в группу

bind = $mainMod CTRL, S, exec, bash -c 'hyprsession --mode save-and-exit && notify-send "✅ Сессия сохранена"'
bind = $mainMod SHIFT, R, exec, bash -c 'hyprsession --mode load-and-exit && notify-send "♻️ Сессия восстановлена"'

# Фокус монитора
bind = $mainMod CTRL, H, focusmonitor, -1
bind = $mainMod CTRL, L, focusmonitor, +1

# Перенос окна
bind = $mainMod SHIFT, H, movewindow, mon:-1, focus
bind = $mainMod SHIFT, L, movewindow, mon:+1, focus

# Перенос workspace
bind = $mainMod CTRL SHIFT, H, movecurrentworkspacetomonitor, -1
bind = $mainMod CTRL SHIFT, L, movecurrentworkspacetomonitor, +1

workspace = 1, monitor:eDP-1
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1

workspace = 6, monitor:HDMI-A-1
workspace = 7, monitor:HDMI-A-1
workspace = 8, monitor:HDMI-A-1
workspace = 9, monitor:HDMI-A-1
workspace = 10, monitor:HDMI-A-1

# Переключение рабочих пространств
bind = $mainMod CTRL, Right, workspace, e+1
bind = $mainMod CTRL, Left, workspace, e-1
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Перемещение окон на рабочие пространства
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Режим изменения размера
bind = $mainMod, R, submap, resize
submap = resize
submap = reset

# Перезапуск и выход
bind = $mainMod, BackSpace, exec, hyprctl reload && ~/.config/hypr/scripts/restart-waybar.sh
bind = $mainMod, Q, exec, ~/.config/hypr/scripts/exit.sh

bind = SUPER, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

##############################
### ПРАВИЛА ОКОН ###
##############################
windowrule = match:class ^(Eog|Sxiv|feh|mpv|Vlc|File-roller|Xarchiver|Zenity|Nm-connection-editor|Pavucontrol|pavucontrol|org.pulseaudio.pavucontrol|xdg-desktop-portal-gtk)$, float on

# XWayland фиксы (пустые окна)
windowrule = match:xwayland true match:class ^$ match:title ^$, float on
windowrule = match:xwayland true match:class ^$ match:title ^$, no_initial_focus on

windowrule = match:fullscreen true, border_size 0

# Pavucontrol
windowrule = match:class ^org.pulseaudio.pavucontrol$, float on
windowrule = match:class ^org.pulseaudio.pavucontrol$, size 50% 50%
windowrule = match:class ^org.pulseaudio.pavucontrol$, center on

# Scratchpad (workspace special:scratchpad)
windowrule = match:workspace special:scratchpad, float on
windowrule = match:workspace special:scratchpad, center on
windowrule = match:workspace special:scratchpad, no_initial_focus on

# Telegram
windowrule = match:class ^telegram-desktop$, workspace 10

# SourceGit
windowrule = match:class ^SourceGit$, no_anim on
windowrule = match:class ^SourceGit$, no_blur on
# windowrule = match:class ^SourceGit$, no_focus on
windowrule = move 0 41 class SourceGit

# Tooltips
windowrule = match:title ^(tooltip|Tooltip)$, float on
windowrule = match:title ^(tooltip|Tooltip)$, no_anim on

windowrule = match:xwayland true, no_initial_focus on

#################
### АВТОЗАПУСК ###
#################
exec-once = waybar --config ~/.config/waybar/config.jsonc --style ~/.config/waybar/style.css
exec-once = hyprpaper
exec-once = hypridle
exec-once = dunst

exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

exec-once = wl-paste --type text --watch cliphist store 
exec-once = wl-paste --type image --watch cliphist store
