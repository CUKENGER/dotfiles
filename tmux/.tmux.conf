set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Основной префикс
set -g prefix C-a

# Сортировка по имени
bind s choose-tree -sZ -O name

set -g base-index 1
setw -g pane-base-index 1

# Переназначение клавиш
unbind %
bind | split-window -h 

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.tmux.conf

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z

set -g mouse on

set-window-option -g mode-keys vi
bind -n M-v copy-mode

bind-key -T copy-mode-vi 'v' send -X begin-selection 
bind-key -T copy-mode-vi 'y' send -X copy-selection 

unbind -T copy-mode-vi MouseDragEnd1Pane
# Плагины
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
# set -g @plugin 'jimeh/tmux-themepack'
set -g @plugin 'tmux-plugins/tmux-resurrect' 
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sessionist'

set -g @plugin 'catppuccin/tmux'

# Статусбар
set -g status on
set -g status-interval 2
set -g status-justify centre
set -g status-left-length 50
set -g status-right-length 150

# Цвета и закругления через Powerline символы
set -g status-left "#[bg=#1e1e2e,fg=#f5c2e7]#[bg=#f5c2e7,fg=#1e1e2e] #S #[bg=#1e1e2e,fg=#f5c2e7]"
set -g status-right "#[bg=#1e1e2e,fg=#89b4fa]#[bg=#89b4fa,fg=#1e1e2e] #(uptime | cut -d',' -f1) #[bg=#1e1e2e,fg=#89b4fa]"

# Панели
set -g pane-border-style fg=#44475a
set -g pane-active-border-style fg=#f38ba8

# Цветовые эффекты для сообщений и выбора
set -g message-style fg=#f8f8f2,bg=#282a36
set -g @catppuccin_style_active_window "bold"
set -g @catppuccin_style_inactive_window "dim"

# set -g @themepack 'powerline/default/purple'

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-dir '~/.tmux/resurrect'
set -g @resurrect-hook-post-kill-session 'rm -f ~/.tmux/resurrect/last'
set -g @continuum-restore 'off'
set -g @continuum-save-interval '15'

bind-key C-s run-shell -b '~/.tmux/plugins/tmux-resurrect/scripts/save.sh'
bind-key C-r run-shell -b '~/.tmux/plugins/tmux-resurrect/scripts/restore.sh'

# Старт менеджера плагинов
run '~/.tmux/plugins/tpm/tpm'
#
# run-shell "~/dotfiles/tmux/github-dark.conf"

